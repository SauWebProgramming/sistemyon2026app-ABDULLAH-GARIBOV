name: CI/CD Pipeline - Docker Build and Push

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository name (Docker tag fix)
        run: |
          echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push API Image
        run: |
          docker build -t ghcr.io/${{ env.REPO_LC }}-api:latest ./StudentApi
          docker push ghcr.io/${{ env.REPO_LC }}-api:latest

      - name: Build and push Web Image
        run: |
          docker build -t ghcr.io/${{ env.REPO_LC }}-web:latest ./StudentWeb
          docker push ghcr.io/${{ env.REPO_LC }}-web:latest